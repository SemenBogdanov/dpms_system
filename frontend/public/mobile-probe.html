<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>DPMS mobile probe</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f8;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #d9e1ea;
        border-radius: 12px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 8px 0;
        line-height: 1.45;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #eef2f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DPMS mobile probe</h1>
      <p>Если эта страница видна на телефоне, домен, TLS и nginx доступны.</p>
      <p>Страница не использует React, API и JavaScript bundle.</p>
      <p>Release: <code>mobile-probe-v1</code></p>
    </main>
  </body>
</html>

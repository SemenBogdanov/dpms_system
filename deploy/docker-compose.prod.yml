services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
